<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" preserveAspectRatio="xMidYMid meet" role="img" aria-label="1週間で1キロ痩せるダイエット 無料LINE講座 キービジュアル">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf3e8"/>
      <stop offset="55%" stop-color="#fbe9d4"/>
      <stop offset="100%" stop-color="#f5e0b8"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7d987"/>
      <stop offset="50%" stop-color="#d4a64f"/>
      <stop offset="100%" stop-color="#a07a30"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9485a"/>
      <stop offset="100%" stop-color="#862028"/>
    </linearGradient>
    <linearGradient id="phoneShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(15,23,38,0)"/>
      <stop offset="100%" stop-color="rgba(15,23,38,0.18)"/>
    </linearGradient>
    <radialGradient id="cornerGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffe066" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffe066" stop-opacity="0"/>
    </radialGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.30"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="1100" fill="url(#bgGrad)"/>

  <!-- Corner glows / soft sparkle areas -->
  <circle cx="80" cy="100" r="180" fill="url(#cornerGlow)"/>
  <circle cx="720" cy="980" r="200" fill="url(#cornerGlow)"/>

  <!-- Decorative leaves (top-left & bottom-right) -->
  <g opacity="0.55" stroke="#c9485a" stroke-width="1.4" fill="none" stroke-linecap="round">
    <g transform="translate(46, 80) rotate(-20)">
      <path d="M0 0 Q22 -16 50 0 Q22 16 0 0"/>
      <path d="M50 0 L80 -6"/>
      <path d="M30 -10 L48 -22"/>
      <path d="M30 10 L48 22"/>
    </g>
    <g transform="translate(720, 1020) rotate(160)">
      <path d="M0 0 Q22 -16 50 0 Q22 16 0 0"/>
      <path d="M50 0 L80 -6"/>
      <path d="M30 -10 L48 -22"/>
      <path d="M30 10 L48 22"/>
    </g>
  </g>

  <!-- Outer gold border -->
  <rect x="14" y="14" width="772" height="1072" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" rx="14"/>
  <rect x="22" y="22" width="756" height="1056" fill="none" stroke="#d4a64f" stroke-width="0.6" stroke-dasharray="2,4" rx="10" opacity="0.6"/>

  <!-- Top ribbon: 期間限定・完全無料公開 -->
  <g transform="translate(120, 60)">
    <path d="M0 0 L560 0 L530 30 L560 60 L0 60 L30 30 Z" fill="url(#redGrad)" filter="url(#softShadow)"/>
    <text x="280" y="38" text-anchor="middle"
          font-family="'Shippori Mincho','Noto Serif JP',serif"
          font-size="26" font-weight="900" fill="#ffffff" letter-spacing="6">
      期間限定・完全無料公開
    </text>
    <text x="280" y="14" text-anchor="middle" font-size="10" fill="#ffe066" letter-spacing="8" font-weight="700">LIMITED OFFER</text>
  </g>

  <!-- 「いま登録するだけで」eyebrow -->
  <text x="400" y="180" text-anchor="middle"
        font-family="'Shippori Mincho','Noto Serif JP',serif"
        font-size="22" font-weight="700" fill="#c9485a" letter-spacing="6">
    ＼ いま登録するだけで ／
  </text>

  <!-- Main title 1: 1週間で1kg痩せる (with yellow highlight) -->
  <rect x="120" y="208" width="560" height="20" rx="3" fill="#ffe066" opacity="0.85"/>
  <text x="400" y="232" text-anchor="middle"
        font-family="'Shippori Mincho','Noto Serif JP',serif"
        font-size="56" font-weight="900" fill="#2a1f24" letter-spacing="2">
    1週間で1kg痩せる
  </text>

  <!-- Main title 2: 無料LINE講座 (extra large) -->
  <text x="400" y="328" text-anchor="middle"
        font-family="'Shippori Mincho','Noto Serif JP',serif"
        font-size="92" font-weight="900" fill="#d4a64f" letter-spacing="4"
        style="paint-order:stroke; stroke:#a07a30; stroke-width:1.5;">
    無料LINE講座
  </text>
  <text x="400" y="324" text-anchor="middle"
        font-family="'Shippori Mincho','Noto Serif JP',serif"
        font-size="92" font-weight="900" fill="#c9485a" letter-spacing="4">
    無料LINE講座
  </text>

  <!-- Sparkles around title -->
  <g fill="#d4a64f">
    <text x="92" y="240" font-size="26">✦</text>
    <text x="688" y="232" font-size="22">✦</text>
    <text x="60" y="320" font-size="18">✨</text>
    <text x="720" y="320" font-size="20">✦</text>
    <text x="120" y="380" font-size="14">★</text>
    <text x="660" y="376" font-size="14">★</text>
  </g>

  <!-- Phone mockup container -->
  <g transform="translate(240, 400)" filter="url(#softShadow)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="320" height="540" rx="40" fill="#1a1f2a"/>
    <rect x="6" y="6" width="308" height="528" rx="36" fill="#2a3040" opacity="0.5"/>
    <rect x="14" y="14" width="292" height="512" rx="28" fill="#ffffff"/>

    <!-- Notch -->
    <rect x="120" y="14" width="80" height="22" rx="11" fill="#1a1f2a"/>

    <!-- Status bar -->
    <text x="40" y="56" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#0f1726">9:30</text>
    <text x="280" y="56" text-anchor="end" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#0f1726">●●●● 4G</text>

    <!-- LINE official header -->
    <rect x="14" y="64" width="292" height="58" fill="#06c755"/>
    <circle cx="48" cy="93" r="18" fill="#ffffff"/>
    <text x="48" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="900" fill="#06c755">L</text>
    <text x="76" y="92" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="#ffffff">ダイエット整体チーム</text>
    <text x="76" y="108" font-family="system-ui,sans-serif" font-size="9" fill="#d4f5dd">公式アカウント</text>

    <!-- Chat thread (DAY 1-7 messages) -->
    <g font-family="'Shippori Mincho','Noto Serif JP',serif">
      <!-- DAY 1 -->
      <g transform="translate(28, 138)">
        <circle cx="14" cy="14" r="14" fill="#06c755"/>
        <text x="14" y="18" text-anchor="middle" font-size="9" font-weight="900" fill="#fff">L</text>
        <rect x="34" y="2" width="220" height="38" rx="14" fill="#f0f0f0"/>
        <text x="44" y="20" font-size="9" font-weight="800" fill="#c9485a">DAY 1</text>
        <text x="44" y="34" font-size="10.5" font-weight="700" fill="#0f1726">朝の習慣で代謝アップ</text>
      </g>
      <!-- DAY 2 -->
      <g transform="translate(28, 188)">
        <circle cx="14" cy="14" r="14" fill="#06c755"/>
        <text x="14" y="18" text-anchor="middle" font-size="9" font-weight="900" fill="#fff">L</text>
        <rect x="34" y="2" width="220" height="38" rx="14" fill="#f0f0f0"/>
        <text x="44" y="20" font-size="9" font-weight="800" fill="#c9485a">DAY 2</text>
        <text x="44" y="34" font-size="10.5" font-weight="700" fill="#0f1726">食べ方の極意・3原則</text>
      </g>
      <!-- DAY 3 -->
      <g transform="translate(28, 238)">
        <circle cx="14" cy="14" r="14" fill="#06c755"/>
        <text x="14" y="18" text-anchor="middle" font-size="9" font-weight="900" fill="#fff">L</text>
        <rect x="34" y="2" width="220" height="38" rx="14" fill="#f0f0f0"/>
        <text x="44" y="20" font-size="9" font-weight="800" fill="#c9485a">DAY 3</text>
        <text x="44" y="34" font-size="10.5" font-weight="700" fill="#0f1726">むくみ解消・5分習慣</text>
      </g>
      <!-- DAY 4 -->
      <g transform="translate(28, 288)">
        <circle cx="14" cy="14" r="14" fill="#06c755"/>
        <text x="14" y="18" text-anchor="middle" font-size="9" font-weight="900" fill="#fff">L</text>
        <rect x="34" y="2" width="220" height="38" rx="14" fill="#f0f0f0"/>
        <text x="44" y="20" font-size="9" font-weight="800" fill="#c9485a">DAY 4</text>
        <text x="44" y="34" font-size="10.5" font-weight="700" fill="#0f1726">自律神経の整え方</text>
      </g>
      <!-- DAY 5 -->
      <g transform="translate(28, 338)">
        <circle cx="14" cy="14" r="14" fill="#06c755"/>
        <text x="14" y="18" text-anchor="middle" font-size="9" font-weight="900" fill="#fff">L</text>
        <rect x="34" y="2" width="220" height="38" rx="14" fill="#f0f0f0"/>
        <text x="44" y="20" font-size="9" font-weight="800" fill="#c9485a">DAY 5</text>
        <text x="44" y="34" font-size="10.5" font-weight="700" fill="#0f1726">食物繊維の真実</text>
      </g>
      <!-- DAY 6 -->
      <g transform="translate(28, 388)">
        <circle cx="14" cy="14" r="14" fill="#06c755"/>
        <text x="14" y="18" text-anchor="middle" font-size="9" font-weight="900" fill="#fff">L</text>
        <rect x="34" y="2" width="220" height="38" rx="14" fill="#f0f0f0"/>
        <text x="44" y="20" font-size="9" font-weight="800" fill="#c9485a">DAY 6</text>
        <text x="44" y="34" font-size="10.5" font-weight="700" fill="#0f1726">寝る前30秒の魔法</text>
      </g>
      <!-- DAY 7 (highlighted) -->
      <g transform="translate(28, 438)">
        <circle cx="14" cy="14" r="14" fill="#06c755"/>
        <text x="14" y="18" text-anchor="middle" font-size="9" font-weight="900" fill="#fff">L</text>
        <rect x="34" y="2" width="220" height="46" rx="14" fill="url(#redGrad)"/>
        <text x="44" y="20" font-size="9" font-weight="800" fill="#ffe066">DAY 7 ✨</text>
        <text x="44" y="36" font-size="11" font-weight="900" fill="#ffffff">リバウンドゼロのコツ</text>
      </g>
    </g>

    <!-- Phone bottom indicator -->
    <rect x="120" y="514" width="80" height="4" rx="2" fill="#1a1f2a"/>
  </g>

  <!-- Big numbers below the phone: -1kg / 7日間 -->
  <g transform="translate(0, 980)">
    <!-- Left: -1kg -->
    <g transform="translate(140, 0)">
      <circle cx="0" cy="0" r="62" fill="#ffffff" stroke="url(#goldGrad)" stroke-width="3"/>
      <text x="0" y="6" text-anchor="middle"
            font-family="'Shippori Mincho','Noto Serif JP',serif"
            font-size="48" font-weight="900" fill="url(#redGrad)">-1<tspan font-size="24">kg</tspan></text>
      <text x="0" y="-20" text-anchor="middle" font-family="serif" font-size="11" font-weight="800" fill="#c9485a" letter-spacing="3">1WEEK</text>
    </g>

    <!-- Center separator -->
    <text x="400" y="8" text-anchor="middle" font-family="serif" font-size="38" fill="#d4a64f">×</text>

    <!-- Right: 7日間 -->
    <g transform="translate(660, 0)">
      <circle cx="0" cy="0" r="62" fill="#ffffff" stroke="url(#goldGrad)" stroke-width="3"/>
      <text x="0" y="6" text-anchor="middle"
            font-family="'Shippori Mincho','Noto Serif JP',serif"
            font-size="40" font-weight="900" fill="url(#redGrad)">7日間</text>
      <text x="0" y="-20" text-anchor="middle" font-family="serif" font-size="11" font-weight="800" fill="#c9485a" letter-spacing="3">7DAYS</text>
    </g>
  </g>

  <!-- 監修バッジ at bottom -->
  <g transform="translate(280, 1050)">
    <rect x="0" y="0" width="240" height="34" rx="17" fill="#2a1f24"/>
    <text x="120" y="22" text-anchor="middle"
          font-family="'Shippori Mincho','Noto Serif JP',serif"
          font-size="14" font-weight="800" fill="#ffe066" letter-spacing="2">
      ✨ 理学療法士監修 ✨
    </text>
  </g>
</svg>
